name: Release Windows Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: Build target config name
        required: true
        default: emo-vision-train
      source_ref:
        description: Source branch, tag, or commit
        required: true
        default: codex/yolo-pose-custom-ai-labeling
      previous_source_ref:
        description: Optional source base ref for release notes, for example v1.0
        required: false
        default: ''
      release_tag:
        description: Release tag to create or update, for example v1.2.3
        required: true
      release_repo:
        description: GitHub repo to publish releases to, for example owner/repo
        required: false
        default: ''
      release_body_path:
        description: Optional Markdown file in the packager repo to override generated notes
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ inputs.target }} for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout packager
        uses: actions/checkout@v7
        with:
          path: packager

      - name: Load target config
        id: config
        shell: pwsh
        working-directory: packager
        env:
          TARGET: ${{ inputs.target }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_REPO_INPUT: ${{ inputs.release_repo }}
        run: |
          if ($env:TARGET -notmatch '^[A-Za-z0-9_.-]+$') {
            throw "Invalid target name: $env:TARGET"
          }
          if ($env:RELEASE_TAG -notmatch '^v[0-9]+(\.[0-9]+){1,3}([-.][A-Za-z0-9._-]+)?$') {
            throw "release_tag must look like v1.2.3, got: $env:RELEASE_TAG"
          }

          $configPath = Join-Path 'configs' "$env:TARGET.json"
          if (-not (Test-Path -LiteralPath $configPath)) {
            throw "Target config not found: $configPath"
          }

          $config = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json
          foreach ($field in @('source_repo', 'python_version', 'release_asset_name', 'name')) {
            if (-not $config.$field) {
              throw "Missing required config field: $field"
            }
          }

          $releaseRepo = $env:RELEASE_REPO_INPUT.Trim()
          if (-not $releaseRepo -and $config.PSObject.Properties.Name -contains 'release_repo') {
            $releaseRepo = [string]$config.release_repo
            $releaseRepo = $releaseRepo.Trim()
          }
          if (-not $releaseRepo) {
            $releaseRepo = $env:GITHUB_REPOSITORY
          }
          if ($releaseRepo -notmatch '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$') {
            throw "release_repo must look like owner/repo, got: $releaseRepo"
          }

          $ciExtraPackages = @()
          if ($config.PSObject.Properties.Name -contains 'ci_extra_packages') {
            if ($null -ne $config.ci_extra_packages -and $config.ci_extra_packages -isnot [array]) {
              throw "ci_extra_packages must be a list"
            }
            $ciExtraPackages = @($config.ci_extra_packages)
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "source_repo=$($config.source_repo)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "python_version=$($config.python_version)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "release_repo=$releaseRepo"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "ci_extra_packages=$($ciExtraPackages -join ' ')"

      - name: Checkout source
        uses: actions/checkout@v7
        with:
          repository: ${{ steps.config.outputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          path: source
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.config.outputs.python_version }}
          cache: pip
          cache-dependency-path: source/requirements.txt

      - name: Install source dependencies
        shell: pwsh
        working-directory: source
        env:
          CI_EXTRA_PACKAGES: ${{ steps.config.outputs.ci_extra_packages }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          if ($env:CI_EXTRA_PACKAGES.Trim()) {
            $packages = $env:CI_EXTRA_PACKAGES -split ' '
            python -m pip install @packages
          }

      - name: Build and publish Release
        shell: pwsh
        working-directory: packager
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN || github.token }}
          TARGET_INPUT: ${{ inputs.target }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_REPO_INPUT: ${{ steps.config.outputs.release_repo }}
          SOURCE_REF_INPUT: ${{ inputs.source_ref }}
          PREVIOUS_SOURCE_REF_INPUT: ${{ inputs.previous_source_ref }}
          RELEASE_BODY_PATH_INPUT: ${{ inputs.release_body_path }}
        run: |
          $sourceRoot = Join-Path $env:GITHUB_WORKSPACE 'source'
          $publishArgs = @(
            '-Target', $env:TARGET_INPUT,
            '-ReleaseTag', $env:RELEASE_TAG_INPUT,
            '-ReleaseRepo', $env:RELEASE_REPO_INPUT,
            '-SourceRoot', $sourceRoot,
            '-SourceRef', $env:SOURCE_REF_INPUT
          )

          $previousSourceRef = $env:PREVIOUS_SOURCE_REF_INPUT.Trim()
          if ($previousSourceRef) {
            $publishArgs += @('-PreviousSourceRef', $previousSourceRef)
          }

          $releaseBodyPath = $env:RELEASE_BODY_PATH_INPUT.Trim()
          if ($releaseBodyPath) {
            if (-not [System.IO.Path]::IsPathRooted($releaseBodyPath)) {
              $releaseBodyPath = Join-Path $env:GITHUB_WORKSPACE "packager\$releaseBodyPath"
            }
            $publishArgs += @('-ReleaseBodyPath', $releaseBodyPath)
          }

          .\scripts\publish-local-release.ps1 @publishArgs
